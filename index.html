<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assessment Platform</title>
    <!-- UI Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Rich Text & Math (Quill + KaTeX + MathLive) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://unpkg.com/mathlive"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

    <!-- Leaflet for Geofencing Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="style.css">

    <!-- QR Code Libraries for Attendance -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="app" class="min-h-screen bg-premium-gradient flex flex-col transition-all duration-300">
        <!-- Views will be injected here -->
        <div class="p-10 text-center mt-20">
            <div class="w-16 h-1 bg-blue-600 rounded-full animate-pulse mx-auto mb-8 cursor-default"></div>
            <h1 class="text-3xl font-black text-blue-600 mb-4 tracking-tighter uppercase">Assessment Platform</h1>
            <p class="text-[10px] font-black tracking-[0.3em] uppercase text-gray-400 animate-pulse">Establishing Secure
                Connection...</p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
